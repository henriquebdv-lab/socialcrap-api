<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Social Crap</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1 align="center" class="app-title">Social Crap</h1>
</header>

<main style="max-width: 600px; margin: 20px auto;">

<!-- FORMULARIO: cria um novo crap -->
<div class="card">
    <h2>Novo Crap</h2>

    <input id="mensagem" class="input-full" placeholder="Digite seu crap">
    <button onclick="criarCrap()">Enviar</button>

    <p id="status" class="status"></p>
</div>

<!-- LISTA: mostra o feed -->
<div>
    <h2>Feed</h2>
    <ul id="lista" style="list-style: none; padding: 0;"></ul>
</div>

</main>

<script>
    // URL base da API
    const api = "http://localhost:5167/api/Crap";

    // Carrega e renderiza os craps no feed
    async function carregarCraps() {
        const lista = document.getElementById("lista");
        lista.innerHTML = "<li>Carregando...</li>";

        try {
            const response = await fetch(api);
            const dados = await response.json();

            lista.innerHTML = "";

            if (!dados.length) {
                lista.innerHTML = "<li>Nenhum crap ainda ðŸ’©</li>";
                return;
            }

            dados.forEach(c => {
                const li = document.createElement("li");
                li.className = "card";

                li.innerHTML = `
                    <strong>${c.usuarioNome}</strong>
                    <p>${c.mensagem}</p>
                    <button onclick="removerCrap(${c.id})" class="button-secondary">Excluir</button>
                `;

                lista.appendChild(li);
            });

        } catch (error) {
            lista.innerHTML = "<li>Erro ao carregar dados</li>";
        }
    }

    // Envia um novo crap para a API
    async function criarCrap() {
        const mensagemInput = document.getElementById("mensagem");
        const status = document.getElementById("status");

        const mensagem = mensagemInput.value.trim();

        if (!mensagem) {
            status.className = "status status-warn";
            status.innerText = "Digite alguma coisa.";
            return;
        }

        status.className = "status status-info";
        status.innerText = "Enviando...";

        try {
            await fetch(api, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    mensagem: mensagem,
                    usuarioId: 1
                })
            });

            mensagemInput.value = "";
            status.className = "status status-success";
            status.innerText = "Crap enviado.";

            carregarCraps();

        } catch {
            status.className = "status status-error";
            status.innerText = "Erro ao enviar.";
        }
    }

    // Remove um crap pelo id
    async function removerCrap(id) {
        if (!confirm("Excluir esse crap?")) return;

        try {
            await fetch(`${api}/${id}`, {
                method: "DELETE"
            });

            carregarCraps();
        } catch {
            alert("Erro ao excluir");
        }
    }

    // Primeira carga do feed ao abrir a pagina
    carregarCraps();
</script>

</body>
</html>
